volumes:
  postgresbackups:
  pg_data:

services:
  currency_service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: currency_service
    restart: on-failure
    image: currency_service
    ports:
      - "58000:8000"
    volumes:
      - ./currency_service:/currency_service
    command: /bin/sh ./runner.dev.sh
    env_file:
      - ./currency_service/configs/file.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    container_name: currency_service_postgres
    restart: on-failure
    image: kartoza/postgis:15-3.3
    env_file: ./currency_service/configs/file.env
    volumes:
      - ./docker_data/pg_data:/var/lib/postgresql
      - ./docker_data/postgresbackups:/backups
      - ./docker_data/instance_db:/opt/postgres/data
      - ./docker_data/instance_pg_wall:/opt/postgres/pg_wal
    ports:
      - "25434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: "redis:latest"
    container_name: currency_service_redis
    restart: on-failure
    env_file: ./currency_service/configs/file.env
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5